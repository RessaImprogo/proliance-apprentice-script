  candInput.value = state.candidate || '';
  candInput.placeholder = 'Candidate full name...';
  candInput.addEventListener('input', () => {
    state.candidate = candInput.value.trim();
    saveState();
    const topInp = document.getElementById('cand-name');
    if (topInp) topInp.value = state.candidate;
  });
  candWrap.appendChild(candLbl); candWrap.appendChild(candInput);

  const posWrap = document.createElement('div'); posWrap.style.cssText='flex:1;min-width:200px';
  const posLbl = document.createElement('div'); posLbl.className='notes-lbl'; posLbl.textContent='Position applying for';
  const posInput = document.createElement('input'); posInput.className='login-input'; posInput.style.width='100%';
  posInput.value = (state.answers && state.answers.position) || '';
  posInput.placeholder = 'e.g. PA Apprentice';
  posInput.addEventListener('input', () => { state.answers.position = posInput.value.trim(); saveState(); });
  posWrap.appendChild(posLbl); posWrap.appendChild(posInput);

  row.appendChild(candWrap); row.appendChild(posWrap);
  w.appendChild(row);
  return w;
}

// ── INTRODUCTION: is-now-a-good-time branch, with reschedule path ──
function mkIntroBranch() {
  const w = document.createElement('div'); w.className='choice-card';
  const q = document.createElement('div'); q.className='choice-q'; q.textContent='Is now an okay time?'; w.appendChild(q);
  const opts = document.createElement('div'); opts.className='opts';
  const contentArea = document.createElement('div'); contentArea.style.marginTop='10px';

  function render(val) {
    contentArea.innerHTML='';
    if (val==='yes') {
      const n = document.createElement('div'); n.className='context-text'; n.textContent='Great — continue to the next step: Rapport.';
      contentArea.appendChild(n);
    } else if (val==='no') {
      contentArea.appendChild(renderCard({ type:'say', text: '“No worries — when’s a good time today or tomorrow?”' }));
      const lbl = document.createElement('div'); lbl.className='notes-lbl'; lbl.textContent='Booked callback time';
      contentArea.appendChild(lbl);
      const inp = document.createElement('input'); inp.className='login-input'; inp.style.width='100%';
      inp.placeholder='e.g. Tomorrow 3pm';
      inp.value = state.notes.callback_time || '';
      inp.addEventListener('input', ()=>{ state.notes.callback_time = inp.value; saveState(); });
      contentArea.appendChild(inp);
      const note = document.createElement('div'); note.className='context-text'; note.style.marginTop='8px';
      note.textContent='Log this on the calendar and end the call here — do not continue to Rapport.';
      contentArea.appendChild(note);
    }
  }

  const yesBtn = document.createElement('button'); yesBtn.className='opt-btn'; yesBtn.textContent='Yes — good time';
  const noBtn = document.createElement('button'); noBtn.className='opt-btn'; noBtn.textContent='No — reschedule';
  yesBtn.onclick=()=>{ opts.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel-g','sel-r')); yesBtn.classList.add('sel-g'); state.answers.intro_okay='yes'; saveState(); render('yes'); };
  noBtn.onclick=()=>{ opts.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel-g','sel-r')); noBtn.classList.add('sel-r'); state.answers.intro_okay='no'; saveState(); render('no'); };
  if(state.answers.intro_okay==='yes') yesBtn.classList.add('sel-g');
  if(state.answers.intro_okay==='no') noBtn.classList.add('sel-r');
  opts.appendChild(yesBtn); opts.appendChild(noBtn);
  w.appendChild(opts); w.appendChild(contentArea);
  if(state.answers.intro_okay) render(state.answers.intro_okay);
  return w;
}

// ══════════════════════════════════════════════════════════════════
// CASCADING "GETTING TO KNOW THEM" FLOW
// Employed  → job discussion → likes it? → close to sales?
//   likes + close to sales      → frame + pain-point hint → Driver Lanes (skip Gate 1)
//   doesn't like it             → "why sales, out of everything?" → Gate 1 → Driver Lanes
//   likes + NOT close to sales  → Bucket 2, exit here
// Unemployed → how long / what happened → how stayed afloat
//   side gig      → probe → priority (money/growth)
//   own business  → probe → priority (money/growth)
//   student/union → straight to Gate 1
//   priority money  → Commission Runway (short) → yes tight spot = Bucket exit / no = Gate 1
//   priority growth → Gate 1
// ══════════════════════════════════════════════════════════════════
function mkLearnBranch() {
  const w = document.createElement('div');

  const topBtnRow = document.createElement('div');
  topBtnRow.className = 'opts';
  topBtnRow.style.marginBottom = '16px';
  const contentArea = document.createElement('div');

  function clearTopBtns() {
    topBtnRow.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel-g','sel-r','sel-a'));
  }
  function setEmployPill(label, style) {
    const pill = document.getElementById('employ-pill');
    if (!pill) return;
    pill.style.display = 'inline-block';
    pill.style.background = style==='g' ? 'var(--green-bg)' : style==='r' ? 'var(--red-bg)' : 'var(--amber-bg)';
    pill.style.color = style==='g' ? 'var(--green)' : style==='r' ? 'var(--red)' : 'var(--amber)';
    pill.textContent = label;
  }

  function fill(container, cards, ctx) {
    container.innerHTML = '';
    cards.forEach((c,i) => container.appendChild(renderCard(c, (ctx||'learn')+'_'+i)));
  }

  function mkYesNo(key, yesLabel, noLabel) {
    const row = document.createElement('div'); row.className = 'opts'; row.style.margin = '10px 0 4px';
    const out = { row, onPick: null };
    function clear() { row.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel-g','sel-r')); }
    const yesBtn = document.createElement('button'); yesBtn.className = 'opt-btn'; yesBtn.textContent = yesLabel;
    const noBtn = document.createElement('button'); noBtn.className = 'opt-btn'; noBtn.textContent = noLabel;
    yesBtn.onclick = () => { clear(); yesBtn.classList.add('sel-g'); state.answers[key] = 'yes'; saveState(); if (out.onPick) out.onPick('yes'); };
    noBtn.onclick = () => { clear(); noBtn.classList.add('sel-r'); state.answers[key] = 'no'; saveState(); if (out.onPick) out.onPick('no'); };
    row.appendChild(yesBtn); row.appendChild(noBtn);
    if (state.answers[key] === 'yes') yesBtn.classList.add('sel-g');
    if (state.answers[key] === 'no') noBtn.classList.add('sel-r');
    out.restore = () => { if (state.answers[key] && out.onPick) out.onPick(state.answers[key]); };
    return out;
  }

  // ═══════════ EMPLOYED BRANCH ═══════════
  function renderEmployed() {
    const box = document.createElement('div');

    fill(box, [
      { type: 'ask', locked: true, text: '“Can you walk me through your current role — what you do day to day, and how long you’ve been doing it?”' },
      { type: 'ask', locked: true, text: '“What do you like most about it?”' },
    ], 'learn_emp_intro');

    const q1Lbl = document.createElement('div');
    q1Lbl.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);margin:14px 0 4px';
    q1Lbl.textContent = 'Do they actually like their current job?';
    box.appendChild(q1Lbl);

    const likeArea = document.createElement('div');
    const likeYN = mkYesNo('emp_likes_job', 'Likes it', 'Doesn’t like it');
    box.appendChild(likeYN.row);
    box.appendChild(likeArea);

    likeYN.onPick = (val) => {
      likeArea.innerHTML = '';
      if (val === 'no') {
        fill(likeArea, [
          { type: 'context', text: 'Doesn’t like their current job — before jumping into Gate 1, get their reasoning for choosing sales. This creates flow instead of jumping straight into "what\'s breaking."' },
          { type: 'ask', text: '“Out of everything you could pursue — every career, every industry — why sales? Why sales specifically?”' },
          { type: 'note', text: 'Once you have their answer, continue to the next step: Gate 1 — What’s breaking.' },
        ], 'learn_emp_no');
      } else {
        const q2Lbl = document.createElement('div');
        q2Lbl.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);margin:14px 0 4px';
        q2Lbl.textContent = 'Is what they like about it close to sales (people-facing, persuasion, targets, closing)?';
        likeArea.appendChild(q2Lbl);
        const closeArea = document.createElement('div');
        const closeYN = mkYesNo('emp_close_to_sales', 'Close to sales', 'Not close to sales');
        likeArea.appendChild(closeYN.row);
        likeArea.appendChild(closeArea);
        closeYN.onPick = (val2) => {
          closeArea.innerHTML = '';
          if (val2 === 'yes') {
            state.answers.bucket = null;
            fill(closeArea, [
              { type: 'context', text: 'Likes the job AND it’s close to sales → skip Gate 1. Continue to the next step: Driver Lanes — the framing and pain-point question are there.' },
            ], 'learn_emp_close_yes');
          } else {
            state.answers.bucket = 2;
            saveState();
            fill(closeArea, [
              { type: 'context', text: 'Likes the job, but it’s not close to sales — the only issue is something situational (manager, schedule, environment). This is Bucket 2. Exit now, do not proceed to Gate 1.' },
              {
                type: 'exit_block',
                label: 'BUCKET 2 EXIT — say verbatim',
                text: '“If you really enjoy your day to day but you’re only just lacking [their stated reason] — why not just transfer and find another company to work with?”\n\n“That makes sense.”\n\n“Sales requires choosing discomfort on purpose. Without a strong reason behind it, most people lose momentum once it gets hard.”\n\n“I don’t want to move you forward before that’s solid. Let’s pause here — if after sitting with it you feel a clear reason that this is something you want to step into intentionally, you can reach back out and we can revisit.”'
              },
              { type: 'note', text: 'Take note: situational pains — manager, schedule, environment. Skip ahead to the Bucket step and log Bucket 2, then end the call.' },
            ], 'learn_emp_close_no');
          }
          saveState();
        };
        closeYN.restore();
      }
      saveState();
    };
    likeYN.restore();

    return box;
  }

  // ═══════════ UNEMPLOYED BRANCH ═══════════
  function renderUnemployed() {
    const box = document.createElement('div');

    fill(box, [
      { type: 'ask', locked: true, text: '“How long have you been unemployed, and what happened?”' },
      { type: 'ask', locked: true, text: '“I’m curious — how did you stay afloat paying the bills?”' },
    ], 'learn_unemp_intro');

    const afloatLbl = document.createElement('div');
    afloatLbl.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px';
    afloatLbl.textContent = 'How did they stay afloat?';
    box.appendChild(afloatLbl);

    const afloatRow = document.createElement('div'); afloatRow.className = 'opts'; afloatRow.style.marginBottom = '10px';
    const afloatArea = document.createElement('div');
    box.appendChild(afloatRow); box.appendChild(afloatArea);

    function clearAfloat() { afloatRow.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel-b')); }

    function renderPriority(container) {
      container.innerHTML = '';
      const pLbl = document.createElement('div');
      pLbl.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);margin:14px 0 8px';
      pLbl.textContent = '“You’ve been unemployed for quite a while now — what’s your priority right now: money, or professional growth/skills?”';
      container.appendChild(pLbl);

      const pRow = document.createElement('div'); pRow.className = 'opts'; pRow.style.marginBottom = '10px';
      const pArea = document.createElement('div');
      container.appendChild(pRow); container.appendChild(pArea);

      const moneyBtn = document.createElement('button'); moneyBtn.className = 'opt-btn'; moneyBtn.textContent = 'Money';
      const growthBtn = document.createElement('button'); growthBtn.className = 'opt-btn'; growthBtn.textContent = 'Professional growth / skills';

      function selectPriority(val, btn) {
        pRow.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('sel-b'));
        btn.classList.add('sel-b');
        state.answers.unemp_priority = val;
        saveState();
        pArea.innerHTML = '';
        if (val === 'growth') {
          fill(pArea, [
            { type: 'context', text: 'Priority is professional growth/skills → proceed straight to Gate 1.' },
            { type: 'note', text: 'Continue to the next step: Gate 1 — What’s breaking.' },
          ], 'learn_unemp_growth');
        } else {
          const cLbl = document.createElement('div');
          cLbl.style.cssText = 'margin-top:10px';
          pArea.appendChild(cLbl);
          fill(cLbl, [
            { type: 'divider_label', text: 'COMMISSION RUNWAY — SHORT CHECK' },
            { type: 'ask', text: '“In sales, there are going to be bad days and there are going to be good days — is the inconsistency going to put you in a tight spot financially?”' },
          ], 'learn_unemp_money_check');
          const tightYN = mkYesNo('unemp_income_tight', 'Yes — would be tight', 'No — I’d manage');
          cLbl.appendChild(tightYN.row);
          const tightArea = document.createElement('div');
          cLbl.appendChild(tightArea);
          tightYN.onPick = (v) => {
            tightArea.innerHTML = '';
            if (v === 'no') {
              fill(tightArea, [
                { type: 'note', text: 'Continue to the next step: Gate 1 — What’s breaking.' },
              ], 'learn_unemp_tight_no');
            } else {
              state.answers.bucket = 9;
              saveState();
              fill(tightArea, [
                { type: 'exit_block', label: 'BUCKET 9 EXIT — say verbatim', text: '“I don’t want to make your situation harder than it already is. If you’re confident to bet on yourself and you know you’re going to succeed, you can reach out anytime.”' },
                { type: 'note', text: 'If they talk well: offer contingency. Skip ahead to the Bucket step and log Bucket 9, then end the call.' },
              ], 'learn_unemp_tight_yes');
            }
          };
          tightYN.restore();
        }
      }

      moneyBtn.onclick = () => selectPriority('money', moneyBtn);
      growthBtn.onclick = () => selectPriority('growth', growthBtn);
      pRow.appendChild(moneyBtn); pRow.appendChild(growthBtn);
      if (state.answers.unemp_priority === 'money') { moneyBtn.classList.add('sel-b'); selectPriority('money', moneyBtn); }
      if (state.answers.unemp_priority === 'growth') { growthBtn.classList.add('sel-b'); selectPriority('growth', growthBtn); }
    }

    function selectAfloat(val, btn) {
      clearAfloat(); btn.classList.add('sel-b');
      state.answers.unemp_afloat = val;
      saveState();
      afloatArea.innerHTML = '';
      if (val === 'sidegig') {
        fill(afloatArea, [
          { type: 'ask', text: '“[Duration] — why don’t you just pursue that full time?”' },
        ], 'learn_unemp_sidegig');
        const cont = document.createElement('div'); afloatArea.appendChild(cont);
        renderPriority(cont);
      } else if (val === 'business') {
        fill(afloatArea, [
          { type: 'ask', text: '“What prevented you from pursuing it full time?”' },
          { type: 'ask', text: '“Why not make a career out of it?”' },
          { type: 'ask', text: '“Are you planning to just do this on the side for income flow, or are you deciding to have this as a full career?”' },
          { type: 'ask', text: '“What’s your plan now with your business?”' },
          { type: 'context', text: 'Mindset check: what\'s their actual plan? Vague or no plan is a soft signal, not an automatic exit.' },
        ], 'learn_unemp_business');
        const cont = document.createElement('div'); afloatArea.appendChild(cont);
        renderPriority(cont);
      } else {
        fill(afloatArea, [
          { type: 'context', text: 'Student or union certifications → proceed straight to Gate 1. Skip the priority question.' },
          { type: 'note', text: 'Continue to the next step: Gate 1 — What’s breaking.' },
        ], 'learn_unemp_student');
      }
    }

    const sideBtn = document.createElement('button'); sideBtn.className = 'opt-btn'; sideBtn.textContent = 'Side gigs';
    const bizBtn = document.createElement('button'); bizBtn.className = 'opt-btn'; bizBtn.textContent = 'Own business';
    const studBtn = document.createElement('button'); studBtn.className = 'opt-btn'; studBtn.textContent = 'Student / union certs';
    sideBtn.onclick = () => selectAfloat('sidegig', sideBtn);
    bizBtn.onclick = () => selectAfloat('business', bizBtn);
    studBtn.onclick = () => selectAfloat('student', studBtn);
    afloatRow.appendChild(sideBtn); afloatRow.appendChild(bizBtn); afloatRow.appendChild(studBtn);
    if (state.answers.unemp_afloat === 'sidegig') { sideBtn.classList.add('sel-b'); selectAfloat('sidegig', sideBtn); }
    if (state.answers.unemp_afloat === 'business') { bizBtn.classList.add('sel-b'); selectAfloat('business', bizBtn); }
    if (state.answers.unemp_afloat === 'student') { studBtn.classList.add('sel-b'); selectAfloat('student', studBtn); }

    return box;
  }

  const empBtn = document.createElement('button'); empBtn.className = 'opt-btn'; empBtn.textContent = '🧑‍💼 Employed';
  const unempBtn = document.createElement('button'); unempBtn.className = 'opt-btn'; unempBtn.textContent = '📋 Unemployed';

  empBtn.onclick = () => {
    clearTopBtns(); empBtn.classList.add('sel-g');
    state.answers.employment = 'employed'; setEmployPill('Employed', 'g'); saveState();
    contentArea.innerHTML = ''; contentArea.appendChild(renderEmployed());
  };
  unempBtn.onclick = () => {
    clearTopBtns(); unempBtn.classList.add('sel-r');
    state.answers.employment = 'unemployed'; setEmployPill('Unemployed', 'r'); saveState();
    contentArea.innerHTML = ''; contentArea.appendChild(renderUnemployed());
  };

  topBtnRow.appendChild(empBtn); topBtnRow.appendChild(unempBtn);
  w.appendChild(topBtnRow); w.appendChild(contentArea);

  if (state.answers.employment === 'employed') { empBtn.classList.add('sel-g'); contentArea.appendChild(renderEmployed()); }
  else if (state.answers.employment === 'unemployed') { unempBtn.classList.add('sel-r'); contentArea.appendChild(renderUnemployed()); }

  return w;
}

function exportSummary() {
  const lines=['PROLIANCE — PA APPRENTICE CALL SUMMARY','Recruiter: '+state.recruiter,'Candidate: '+(state.candidate||'Unnamed'),'Position: '+((state.answers&&state.answers.position)||'—'),'Date: '+new Date().toLocaleDateString(),'','EMPLOYMENT: '+(state.answers.employment||'—'),'LANE: '+(state.answers.lane||'—'),'GATE 1: '+(state.answers.gate1_passed||'—'),'COMMISSION RUNWAY: '+(state.answers.commission_runway_passed||'—'),'BUCKET: '+(state.answers.bucket||'—'),'VERDICT: '+(state.answers.verdict||'—'),''];
  if(state.flags.length){lines.push('FLAGS:');state.flags.forEach(f=>lines.push('  ['+f.color.toUpperCase()+'] '+f.time+': '+f.text));lines.push('');}
  if(state.notes.final_notes){lines.push('NOTES:');lines.push(state.notes.final_notes);}
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=(state.candidate||'candidate').replace(/\s+/g,'_')+'_call_summary.txt'; a.click();
  URL.revokeObjectURL(url);
}

function openHistory() {
  document.getElementById('hist-modal').classList.add('open');
  const list=document.getElementById('hist-list'); list.innerHTML='';
  const hist=getHistory(state.recruiter);
  if(!hist.length){list.innerHTML='<div class="hist-empty">No saved interviews yet.</div>';return;}
  hist.forEach(entry=>{
    const item=document.createElement('div'); item.className='hist-item';
    const vc={bucket1:'var(--green)',fifty:'var(--amber)',exit1:'var(--red)',exit2:'var(--red)',exit3:'var(--red)',timing:'var(--amber)'}[entry.verdict]||'#999';
    item.innerHTML=`<div class="hist-name">${entry.name}</div><div class="hist-meta">${entry.date} at ${entry.time}${entry.verdict?` · <span style="color:${vc};font-weight:700">${entry.verdict}</span>`:''}${entry.bucket?' · Bucket '+entry.bucket:''}</div>`;
    item.onclick=()=>{if(confirm('Load this interview?')){saveToHistory();state.answers=entry.answers||{};state.flags=entry.flags||[];state.notes=entry.notes||{};state.candidate=entry.name||'';document.getElementById('cand-name').value=state.candidate;closeHistory();saveState();renderStep(state.currentStep);renderFlags();}};
    list.appendChild(item);
  });
}

function closeHistory(){ document.getElementById('hist-modal').classList.remove('open'); }

initLogin();

</script>
