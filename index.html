<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proliance — PA Apprentice Recruiting Script</title>
  <style>

@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDFCFA;--bg2:#F5F1EA;--bg3:#EEE8DD;
  --text:#221F1B;--text2:#6C6459;--text3:#A79C8A;
  --border:rgba(34,31,27,0.09);--border2:rgba(34,31,27,0.17);
  --radius:13px;--radius-sm:8px;
  --blue-bg:#E7EEF1;--blue:#2B5266;
  --green-bg:#E9EFDE;--green:#4B6B2E;
  --amber-bg:#FAEFD9;--amber:#93611A;
  --red-bg:#FBEAE6;--red:#9B3B2C;
  --purple-bg:#EFE9F3;--purple:#63508A;
  --teal-bg:#E2EFEA;--teal:#1F5F51;
  --gray-bg:#F1ECE2;--gray:#6B6459;
  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg2);color:var(--text);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)}
.login-box{background:var(--bg);border:1px solid var(--border2);border-radius:18px;padding:44px 44px;width:370px;text-align:center;box-shadow:0 8px 32px rgba(34,31,27,0.09)}
.login-logo{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:26px}
.login-title{font-family:var(--serif);font-size:26px;font-weight:600;color:var(--text);margin-bottom:6px;letter-spacing:-.01em}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px}
.user-btns{display:flex;flex-direction:column;gap:10px}
.user-btn{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg);font-size:14px;font-weight:500;font-family:inherit;color:var(--text);cursor:pointer;transition:all .13s}
.user-btn:hover{background:var(--bg2);border-color:var(--blue);color:var(--blue)}

/* APP */
#app{display:none;flex-direction:column;position:fixed;inset:0;overflow:hidden}
#app.visible{display:flex}
.app-inner{display:flex;flex:1;overflow:hidden;min-height:0}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 18px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;flex-wrap:wrap}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-logo{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);white-space:nowrap}
.cand-input{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:5px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:160px;outline:none;transition:border-color .15s}
.cand-input:focus{border-color:var(--blue)}
.pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap}
.flag-bar{display:flex;gap:5px}
.flag-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-family:inherit;transition:all .13s}
.flag-btn[data-color="green"]:hover{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.flag-btn[data-color="amber"]:hover{background:var(--amber-bg);color:var(--amber);border-color:var(--amber)}
.flag-btn[data-color="red"]:hover{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.hist-btn,.logout-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);transition:background .13s}
.hist-btn:hover,.logout-btn:hover{background:var(--bg3)}

/* FLAGS */
.flags-strip{padding:5px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:none;flex-wrap:wrap;gap:5px;flex-shrink:0}
.flags-strip.visible{display:flex}
.flag-chip{font-size:11px;font-weight:500;padding:2px 9px;border-radius:10px}

/* PROGRESS */
.prog-bar{height:3px;background:var(--border);flex-shrink:0}
.prog-fill{height:100%;background:var(--blue);transition:width .3s}

/* SIDEBAR */
#sidebar{width:224px;min-width:224px;border-right:1px solid var(--border);overflow-y:auto;background:var(--bg2);flex-shrink:0}
.sb-sec{padding:12px 14px 4px;font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text3)}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 6px;border-radius:var(--radius-sm);cursor:pointer;font-size:12.5px;color:var(--text2);transition:background .12s;border-left:2px solid transparent}
.sb-item:hover{background:var(--bg2)}
.sb-item.active{background:var(--bg);color:var(--text);font-weight:600;border-left-color:var(--blue)}
.sb-dot{width:7px;height:7px;border-radius:50%;background:#d0d0cc;flex-shrink:0;transition:background .2s}
.sb-item.done .sb-dot{background:var(--green)}
.sb-item.active .sb-dot{background:var(--blue)}
.sb-rating{margin-left:auto;font-size:11px;font-weight:700}
.sb-divider{height:1px;background:var(--border);margin:5px 12px}

/* SCROLL */
#scroll-area{flex:1;overflow-y:auto;padding:22px 26px 60px;background:var(--bg)}
.step-eye{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.step-title{font-family:var(--serif);font-size:23px;font-weight:600;color:var(--text);margin-bottom:18px;letter-spacing:-.01em}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;margin-bottom:11px;position:relative;transition:box-shadow .15s,border-color .15s;box-shadow:0 1px 2px rgba(34,31,27,0.03)}
.card:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(34,31,27,0.06)}
.card:hover .edit-hint{opacity:1}
.edit-hint{position:absolute;top:8px;right:10px;font-size:10px;color:var(--text3);opacity:0;transition:opacity .2s;pointer-events:none}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:8px;letter-spacing:.04em}
.t-say{background:var(--blue-bg);color:var(--blue)}
.t-ask{background:var(--green-bg);color:var(--green)}
.t-note{background:var(--amber-bg);color:var(--amber)}
.t-rule{background:var(--red-bg);color:var(--red)}
.t-listen{background:var(--gray-bg);color:var(--gray)}
.t-exit{background:var(--red-bg);color:var(--red)}
.t-branch{background:var(--purple-bg);color:var(--purple)}
.t-context{background:var(--teal-bg);color:var(--teal)}
.q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.65}
.kv-text{font-size:13px;color:var(--text2);line-height:1.75}
.kv-text b,.kv-text strong{color:var(--text);font-weight:700}
.editable{outline:none;border-radius:4px}
.editable:focus{background:#f0f7ff;outline:2px solid var(--blue);outline-offset:3px}

/* CHOICES */
.choice-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;margin-bottom:10px}
.choice-q{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.opts{display:flex;flex-wrap:wrap;gap:7px}
.opt-btn{padding:7px 15px;border-radius:999px;border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text);transition:all .13s}
.opt-btn:hover{background:var(--bg3)}
.opt-btn.sel-g{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.opt-btn.sel-r{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.opt-btn.sel-a{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.opt-btn.sel-b{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);font-weight:700}

/* EXIT */
.exit-block{border-left:3px solid var(--red);background:var(--red-bg);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 14px;margin-top:10px}
.exit-lbl{font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.exit-say{font-size:13px;color:var(--text);line-height:1.7;font-style:italic}

/* RECRUITER NOTES */
.rec-note{border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin-top:8px;font-size:13px;line-height:1.65}
.rec-note-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}

/* RATING */
.rating-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.r-btn{padding:7px 16px;border-radius:var(--radius-sm);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text2);transition:all .13s}
.r-btn:hover{background:var(--bg2)}
.r-s.on{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.r-c.on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.r-e.on{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}

/* NOTES */
.notes-lbl{font-size:11px;font-weight:600;color:var(--text3);margin:13px 0 5px}
textarea{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 11px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);resize:vertical;min-height:64px;line-height:1.6;outline:none;transition:border-color .15s}
textarea:focus{border-color:var(--blue)}

/* NAV */
.nav-row{display:flex;gap:9px;margin-top:20px}
.btn-primary{padding:10px 22px;border-radius:999px;background:var(--text);color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-sec{padding:10px 16px;border-radius:999px;background:transparent;color:var(--text2);border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;transition:background .13s}
.btn-sec:hover{background:var(--bg2)}

/* BUCKET */
.bucket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:10px}
.bucket-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;cursor:pointer;transition:all .15s}
.bucket-card:hover{background:var(--bg2)}
.bucket-card.sel-b1{border-color:var(--green);background:var(--green-bg)}
.bucket-card.sel-b2,.bucket-card.sel-b3,.bucket-card.sel-b4{border-color:var(--amber);background:var(--amber-bg)}
.bucket-card.sel-b5,.bucket-card.sel-b6,.bucket-card.sel-b7,.bucket-card.sel-b8{border-color:var(--red);background:var(--red-bg)}
.bucket-num{font-size:18px;font-weight:700;color:var(--text)}
.bucket-label{font-size:12px;font-weight:600;color:var(--text);margin-top:2px}
.bucket-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.bucket-action{font-size:11px;margin-top:6px;padding:2px 8px;border-radius:4px;display:inline-block;font-weight:600}

/* DEBRIEF */
.debrief-q{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
.db-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--purple);margin-bottom:6px}
.db-q{font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.55}
.d-opts{display:flex;flex-wrap:wrap;gap:7px}
.d-btn{padding:7px 14px;border-radius:999px;border:1px solid var(--border2);font-size:13px;font-family:inherit;cursor:pointer;background:var(--bg);color:var(--text);transition:all .13s}
.d-btn:hover{background:var(--bg2)}
.d-g{border-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700}
.d-a{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);font-weight:700}
.d-r{border-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700}
.verdict-box{border-radius:var(--radius);padding:18px 20px;margin-top:14px;border:1px solid var(--border)}
.verdict-pending{font-size:12.5px;color:var(--text3);padding:11px 14px;border:1px dashed var(--border2);border-radius:var(--radius-sm);margin-top:10px}

/* SCORE */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.sum-card{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px}
.sum-lbl{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:3px}
.sum-val{font-size:17px;font-weight:700}

/* PDF + SAVE */
.pdf-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--blue);color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:14px;margin-right:8px;transition:opacity .15s}
.pdf-btn:hover{opacity:.85}
.save-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--green);color:#fff;border:none;font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;margin-top:14px;transition:opacity .15s}
.save-btn:hover{opacity:.85}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius);padding:26px;width:580px;max-width:94vw;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.14)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text2);line-height:1}
.hist-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background .13s}
.hist-item:hover{background:var(--bg2)}
.hist-name{font-size:14px;font-weight:700}
.hist-meta{font-size:12px;color:var(--text2);margin-top:3px}
.hist-empty{font-size:13px;color:var(--text3);text-align:center;padding:28px}

@media(max-width:640px){#sidebar{display:none}.cand-input{width:110px}}


.login-name-row{display:flex;gap:8px;margin-bottom:10px}
.login-input{flex:1;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
.login-input:focus{border-color:var(--blue)}
#recent-names{display:none;margin-top:16px}
.recent-label{font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px}
.recent-list{display:flex;flex-wrap:wrap;gap:6px}
.recent-btn{padding:6px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);transition:all .13s}
.recent-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.recruiter-tag{font-size:11px;font-weight:700;background:var(--blue-bg);color:var(--blue);padding:3px 10px;border-radius:20px;white-space:nowrap}
.gate-header{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:15px 19px;margin-bottom:18px;box-shadow:0 1px 2px rgba(34,31,27,0.03)}
.gate-badge{background:var(--blue);color:#fff;border-radius:7px;padding:8px 14px;font-weight:700;font-size:13px;white-space:nowrap;font-family:var(--serif)}
.gate-name{font-family:var(--serif);font-weight:600;font-size:16px}
.gate-sub{font-size:12px;color:var(--text2);margin-top:2px}
.signal-box{border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px}
.pass-box{background:var(--green-bg)}
.fail-box{background:var(--red-bg)}
.signal-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.pass-header{color:var(--green)}
.fail-header{color:var(--red)}
.signal-item{font-size:13px;color:var(--text);padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);line-height:1.5}
.signal-example{font-size:12px;color:var(--text2);font-style:italic;padding:4px 0 6px 10px;border-left:2px solid rgba(0,0,0,.1);margin:2px 0 6px;line-height:1.55}
.gate2-q-header{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.gate2-q-card{position:relative;padding-left:44px !important}
.gate2-q-num{position:absolute;left:14px;top:14px;font-size:18px;font-weight:800;color:var(--blue)}
.pf-col{border-radius:var(--radius-sm);padding:10px 12px}
.pf-pass{background:var(--green-bg)}
.pf-fail{background:var(--red-bg)}
.pf-header{font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:7px}
.pf-pass .pf-header{color:var(--green)}
.pf-fail .pf-header{color:var(--red)}
.pf-item{font-size:12.5px;color:var(--text);padding:3px 0;border-bottom:1px solid rgba(0,0,0,.06);line-height:1.5}
.ref-toggle{background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text2);margin-bottom:6px;transition:all .13s;display:inline-block}
.ref-toggle:hover{background:var(--bg2)}
.ref-box{background:var(--bg2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px}
.ref-label{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;margin-bottom:6px}
.ref-item{font-size:12.5px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border);line-height:1.5}
.sp-row{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;overflow:hidden}
.sp-header{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .13s}
.sp-header:hover{background:var(--bg2)}
.sp-name{font-size:14px;font-weight:700;flex:1}
.sp-meta{font-size:12px;color:var(--text2)}
.sp-toggle{font-size:18px;color:var(--text3);font-weight:300;margin-left:auto}
.sp-detail{padding:10px 12px;font-size:13px;color:var(--text);line-height:1.7;border-top:1px solid var(--border);background:var(--bg2)}
.notes-toggle{margin-top:16px}
.notes-toggle-btn{background:none;border:1px dashed var(--border2);border-radius:var(--radius-sm);padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;color:var(--text3);transition:all .13s}
.notes-toggle-btn:hover{background:var(--bg2);color:var(--text2)}
.notes-wrap{margin-top:6px}
.context-text{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6;font-style:italic;padding:6px 10px;background:var(--bg2);border-radius:4px;border-left:2px solid var(--border2)}
.listen-toggle-row{cursor:default}
.beats-title,.exit-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.kv-text{font-size:13px;color:var(--text2);line-height:1.75}

  </style>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Proliance Public Adjusting</div>
    <div class="login-title">Recruiting Call Script</div>
    <div class="login-sub">PA Apprentice</div>
    <div class="login-name-row">
      <input class="login-input" id="recruiter-input" placeholder="Your name..." autocomplete="off">
      <button class="user-btn" id="login-btn" style="width:auto;padding:11px 18px">Start</button>
    </div>
    <div id="recent-names">
      <div class="recent-label">Recent</div>
      <div class="recent-list" id="recent-list"></div>
    </div>
  </div>
</div>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">Proliance · PA Apprentice</span>
      <span class="recruiter-tag" id="recruiter-name-display"></span>
      <input class="cand-input" id="cand-name" placeholder="Candidate name...">
      <span id="employ-pill" class="pill" style="display:none"></span>
      <span id="lane-pill" class="pill" style="display:none"></span>
      <div class="flag-bar">
        <button class="flag-btn" data-color="green">+ Green</button>
        <button class="flag-btn" data-color="amber">+ Yellow</button>
        <button class="flag-btn" data-color="red">+ Red</button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="hist-btn" onclick="openHistory()">History</button>
      <button class="hist-btn" id="new-btn">+ New</button>
      <button class="logout-btn" onclick="logout()">Log out</button>

<script>
const STEPS = [

  // ─── STEP 0: SETUP ───
  {

    label: 'Candidate & call setup',

    cards: [

    ]

      { type: 'say', locked: true, text: '“Hi, is this [candidate]? This is [recruiter] — the reason for my call is to discuss your job application for the [position] here at Proliance.”' },

      { type: 'intro_branch' },
    ]

      { type: 'ask', locked: true, text: '“Thanks for making time. How are you doing today?”' },
      { type: 'ask', locked: true, text: '“Are you calling from work today, or are you at home?”' },
      {
        type: 'phrase_bank', label: 'If they say HOME — pick one', color: 'blue',
        options: [
          '“Nice. Has it been one of those productive work-from-home days, or are you squeezing this call in between everything else?”',
          '“Working from home definitely has its perks. What’s your favorite part about it?”',
          '“I always find people either love working from home or can’t wait to get out of the house. Which camp are you in?”',
          '“Nice. Is that your normal setup these days, or just today?”',
          '“Nice. Is this where you usually work from, or are you enjoying a day off today?”',
        ]
      },
      {
        type: 'phrase_bank', label: 'If they say WORK — pick one', color: 'amber',
        options: [
          '“Busy day over there, or did we catch you at a good time?”',
          '“Ah, gotcha. Busy environment, or are you able to sneak away for a few minutes?”',
          '“Oh nice. Without giving away any trade secrets, what kind of day has it been over there?”',
        ]

      {
        type: 'phrase_bank', label: 'Universal follow-ups — either answer', color: 'green',

          '“What’s today looked like for you so far?” — people naturally tell a story with this one.',
          '“Mondays and Fridays always have a different vibe. How’s today been?” (adapt to whatever day it is)',

          '“Anything interesting keeping you busy lately?” — often surfaces projects, kids, travel, moving, hiring.',
        ]

        type: 'phrase_bank', label: 'Forced-choice hack — use anytime it feels flat', color: 'purple',
        options: [
          '“Has today been pretty calm, or has it been one thing after another?”',
          '“Are you someone who likes working remotely, or do you actually miss being in the office?”',
          '“Are you an early bird, or does your day usually get busy later on?”',
        ]
      },
      {
        type: 'dialogue_example',
        lines: [
          { speaker: 'You', text: '“How are you doing today?”' },
          { speaker: 'Candidate', text: '“Good!”' },
          { speaker: 'You', text: '“Glad to hear it. Are you at home today or at work?”' },
          { speaker: 'Candidate', text: '“At work.”' },
          { speaker: 'You', text: '“Nice. Busy day, or did we catch you at a good time?”' },
          { speaker: 'Candidate', text: '“Pretty busy — we’ve been short-staffed.”' },
          { speaker: 'You', text: '“I can imagine. Hopefully this call gives you a nice change of pace for a few minutes.”' },

      { type: 'note', text: 'Mindset: don’t think “what’s my next rapport question” — think “what about that answer could I be curious about for another 20 seconds?” Acknowledging what they said (like the last line above) often builds more rapport than another clever question. Once it feels natural, move to Goals.' },

      { type: 'say', locked: true, text: 'GOAL\n\n“The goal here is to learn a little bit about you — your skills, experience, your financial goals — and whether we can help you achieve those in this position. I also want to share a little bit about the job so you can see if you actually like it.”\n\n“At the same time, I also want to find out if you’d be a good fit for our team, since this is a pathway to becoming a licensed Public Adjuster.”\n\n“If it all makes sense, we can move forward with the next steps.”' },
    ]
  },

  // ─── STEP 4: GETTING TO KNOW THEM (cascading employment gate) ───
  {
    id: 'learn',
    label: 'Getting to know them',
    section: 'Opening',
    cards: [
      { type: 'context', text: 'This section forces a bucket. Employed candidates split three ways; unemployed candidates split by how they stayed afloat, then by priority. Every path either lands them in Gate 1 / Driver Lanes, or exits them here.' },
      { type: 'say', locked: true, text: '“Perfect! So to begin, I just want to know — are you employed, unemployed, or in between jobs?”' },
      { type: 'learn_branch' }
    ]
  },

  // ─── STEP 5: GATE 1 ───
  {
    id: 'gate1',
    label: 'Gate 1 — What’s breaking',
    section: 'The Gates',
    gate: true,
    gateNum: 1,
    gateTitle: 'Is something actually breaking — or is this just dissatisfaction?',
    cards: [
      { type: 'ask', text: '“If you stay exactly where you are for the next six months — same job, same income, same situation — what’s your biggest concern?”' },
      { type: 'rule_toggle', label: 'If vague or no urgency — follow up', text: '“Is that something that fixes itself over time — or does it get worse the longer you wait?”\n\nIf it fixes itself or they’re not sure — exit.\nIf it gets worse — continue.' },
      {
        type: 'gate1_picker',
        question: 'What’s actually driving them? Pick one:',
        opts: [
          { label: 'Financial pressure', val: 'financial', style: 'b' },
          { label: 'Lack of growth', val: 'growth', style: 'b' },
          { label: 'Environment / boredom', val: 'environment', style: 'b' },
        ]
      },
      {
type: 'exit_block', label: 'EXIT — if nothing is breaking', text: '“Here’s what I’m noticing — everything you’re describing sounds more like dissatisfaction than something that’s actually breaking. And that’s OK, but I want to be honest with you. The people who push through the hard weeks in this role usually have something specific they can’t afford to lose. Without that, it tends to feel optional when it gets tough. I don’t want to set you up for that. Let’s leave it here for now — and if something changes and the urgency becomes clearer, reach back out.”' },
      { type: 'gate_pass', key: 'gate1' }
    ]
  },

  // ─── STEP 6: DRIVER LANES ───
  {
    id: 'lane_questions',
    label: 'Driver lanes',
    section: 'The Gates',
    cards: [
      { type: 'context', text: 'Use the lane that matches what they told you in Gate 1. Deepen the problem first — then connect it to the role. Do not pitch until the connection lands.' },
      { type: 'say', text: '“I’m here to understand what you’re looking for — or hoping for — in your next job opportunity.”' },
      { type: 'note', text: 'Hint: ask for their pain point directly before choosing a lane — e.g. “What’s the one thing missing from where you are now that you’re hoping to find in your next role?” Their answer tells you which lane to use.' },
      { type: 'lane_menu_toggle' },
      {
        type: 'lane_choice',
        question: 'Which lane?',
        opts: [
          { label: 'Lane A — Financial', val: 'A', style: 'b' },
          { label: 'Lane B — Growth / new skills', val: 'B', style: 'b' },
          { label: 'Lane C — Environment / challenge', val: 'C', style: 'b' },
        ]
      },
      {
        type: 'lane_content',
        lanes: {
          A: [
            { type: 'divider_label', text: 'DEEPEN THE PROBLEM' },
            { type: 'ask', text: '“What does your income look like right now — and what would it need to be for things to actually feel different?”' },
            { type: 'ask', text: '“What specifically is not getting covered right now because of where your income is?”' },
            { type: 'ask', text: '“If nothing changes in six months — same pay, same job — what’s the first thing that actually breaks for you?”' },
            { type: 'divider_label', text: 'RISK APPETITE' },
            { type: 'context', text: 'Set context before asking — don’t fire this cold.' },
            { type: 'say', text: '“If you had two job offers right now — one is easy, stable, guaranteed pay every two weeks. The other is harder, real risk involved, but the upside is $60K to $100K a year if you put in the work.”\n\n“Which one do you take — and why?”' },
            { type: 'commission_interrupt', text: 'If they ask "is this commission?" before you get there:\n\n“Yes — and I want to walk you through that in a few minutes. Before that, I want to understand how you think about risk first.”\n\nThen continue.' },
            { type: 'listen', items: [
              'Picks high upside with specific reason → strong signal. Continue.',
              'Picks stability or hesitates → "What gives you pause about the risk?" Dispositional = Bucket 7. Real obligations = continue.',
            ]},
            { type: 'divider_label', text: 'EARNINGS TARGET' },
            { type: 'ask', text: '“What would you need to be earning for it to feel like you’re actually moving forward — do you have a number in your head?”' },
            { type: 'divider_label', text: 'CONNECT TO THE ROLE' },
            { type: 'say', text: '“What you just described — [mirror their specific fact] — that’s exactly the problem this role is built to solve. You’re not capped here. What you put in is what you get out.”\n\n“The question isn’t whether the money is there — it is. The question is whether you can hold on through the weeks where it hasn’t clicked yet.”' },
          ],
          B: [
            { type: 'divider_label', text: 'WHAT GROWTH MEANS TO THEM' },
            { type: 'ask', text: '“When you say you want to grow — what does that actually look like for you? Is it building a skill, earning a title, becoming someone people come to, something else?”' },
            { type: 'ask', text: '“Why sales specifically as the thing you want to get better at — not customer service, not management, not something else?”' },
            { type: 'ask', text: '“What does being good at sales actually mean for your life — not just the job, what does it open up for you?”' },
            { type: 'divider_label', text: 'EXPERIENCE CHECK' },
            { type: 'ask', text: '“Have you done any selling before — formally or informally? What did you learn about yourself from it?”' },
            { type: 'context', text: 'Not a gate — just intelligence. Someone who’s sold before and loved it is a different pitch than someone drawn to the idea. Both can move forward.' },
            { type: 'divider_label', text: 'CONNECT TO THE ROLE' },
            { type: 'say', text: '“What we’ve seen is that people come from [background match] with no sales background and within six months they’re licensed, leading, closing their own deals.”\n\n“The growth here isn’t theoretical. It’s structured, it’s fast, and it’s tied directly to what you earn. The better you get, the more you make — there’s no waiting for someone to notice.”' },
          ],
          C: [
            { type: 'divider_label', text: 'WHAT IS WRONG WITH THE CURRENT ENVIRONMENT' },
            { type: 'ask', text: '“What is it about the people or the energy around you right now that isn’t working?”' },
            { type: 'divider_label', text: 'WHAT GOOD LOOKS LIKE' },
            { type: 'ask', text: '“Describe the environment you’d actually want to be in. What does it feel like, what are the people like, what’s the energy?”' },
            { type: 'divider_label', text: 'THE HONEST TEST' },
            { type: 'say', text: '“The environment here is competitive and fast. People push each other. But it only feels good when you’re producing — when the deals aren’t coming, it gets uncomfortable fast.” “Does that sound like what you’re looking for — or does that sound like a lot?”' },
            { type: 'listen', items: [
              'Leans in → ask the credibility check below, then connect and hand off to commission.',
              'Hesitates → "What gives you pause?" If fear of performance pressure → one more probe. If "too intense" → clean exit.',
            ]},
            { type: 'rule_toggle', label: 'Credibility check — if they lean in', text: '“When was the last time you were in an environment like that — what was it and how did you perform?”\n\nIf they can name a real example → credible. Continue.\nIf they can’t → they’re imagining a version of themselves. Note it and watch the commission reaction.' },
            { type: 'divider_label', text: 'CONNECT TO THE ROLE' },
            { type: 'say', text: '“What you’re looking for — [mirror what they described] — is actually what we’re built around. The people here are competitive, they hold each other accountable, and the culture moves fast.” “But I want to be honest — the environment only feels good when you’re producing. If the numbers aren’t there, the environment gets hard. So what we need to know is whether you’re the kind of person who steps up when it’s uncomfortable — not just when it’s easy.”' },
            {
              type: 'exit_block',
              label: 'EXIT — if it’s just boredom',
              text: '“What I’m hearing is that you want something different but nothing is actually broken yet. The people who push through the hard weeks here usually have something specific they can’t afford to lose. Without that this tends to feel optional when it gets tough. Let’s leave it here for now.”'
            },
          ],

        }
      }
    ]
  },

  // ─── STEP 7: COMMISSION RUNWAY (employed track, full disclosure) ───
  {
    id: 'commission_runway',
    label: 'Commission runway',
    section: 'The Gates',
    gate: true,
    gateNum: 2,
    gateTitle: 'Can they actually live on 100% commission long enough to get good at it?',
    showIf: () => state.answers.employment === 'unemployed',
    cards: [
      { type: 'context', text: 'This is the full pay disclosure + comfort check. Employed candidates who reached Driver Lanes land here. Personalize the first line with what they told you.' },
      { type: 'say', locked: true, text: '“Before we move forward, there’s something important I want to be upfront about regarding our pay structure — especially because [mirror what they told you].”\n\n“This role is performance-based, which means pay is 100% commission. For us, we do this because we want control over our income — it reflects our effort and results, and there’s no cap.”\n\n“The average amount most people on our team earn is between $1,000 to $1,500 a week, and our top performers earn $2,000 to $3,000.”\n\n“But it wasn’t always like that — there were weeks when they were only earning $500 to $600, especially in their first few weeks. That’s the reality in sales — some days are really good, some days are tough.”\n\n“I’ve seen talented people not thrive in this setup — not because they were bad at the job, but because they weren’t financially or mentally ready to step into a straight commission opportunity.”' },
      { type: 'divider_label', text: 'QUESTION STOP' },
      { type: 'ask', text: '“So let me ask you — are you comfortable switching to 100% commission, or is a stable income something you need right now?”' },
      { type: 'rule_toggle', label: 'Follow-up if they hesitate', text: '“What’s going to cover your basic needs?”\n\n“So I want to ask you — if you switch to a paid-by-performance role, do you have something covering your basic needs, or is stable income something you need right now?”' },
      {
        type: 'commission_choice',
        question: 'What did they choose?',
        key: 'commission_comfort',
        opts: [
          { label: 'Comfortable with commission', val: 'comfortable', style: 'g' },
          { label: 'Needs stable income', val: 'stable', style: 'r' },

        stableContent: [
          { type: 'divider_label', text: 'IF THEY CHOSE STABLE INCOME' },
          { type: 'ask', text: '“I understand — a stable income is what you need. If we were to provide you with that guaranteed pay, what would make that the right decision on our end?”' },
          { type: 'ask', text: '“I understand. Can you tell me a little more about why having a stable income is important for you right now?”' },
          { type: 'context', text: 'This is not an automatic exit — use judgment. Real, immediate need with no runway → treat like a timing exit. Soft preference with some flexibility → note it as a flag and continue to Role Overview.' },
        ],
        comfortableContent: [
          { type: 'note', text: '“Some candidates get excited by the potential of earning six figures and growing into leadership — but once they’re in the field, they realize they have to lock in and stay focused.”\n\n“This isn’t just a punch-in, punch-out job — for us, this role at Proliance is a solution: financial growth, professional growth, or personal growth.”' },
        ]
      },
      { type: 'gate_pass', key: 'commission_runway' }
    ]
  },

  // ─── STEP 8: ROLE OVERVIEW ───
  {
    id: 'role',
    label: 'Role overview',
    section: 'Role Overview',
    cards: [
      { type: 'context', text: 'You’ve found the fact. You’ve connected it to the role. Now pitch it — Industry, then Door to Door, then Schedule and Pay, then hand off to Homework.' },
      { type: 'divider_label', text: 'INDUSTRY' },
      {
        type: 'beats',
        title: 'Industry & mission — four beats, in order',
        beats: [
          { label: 'Beat 1 — The right', text: '“A lot of homeowners don’t know that when there are storm damages on their roof — the majority of the cost to fix or replace that should be covered by their insurance. Homeowners should not pay out of pocket. That’s what the insurance is there for.”' },
          { label: 'Beat 2 — The problem', text: '“But the reality is most homeowners don’t know that. And instead of stepping in, insurance companies drag the process, make it confusing — and in most cases, they’ll deny claims even when there’s visible damage.”' },
          { label: 'Beat 3 — The solution', text: '“This is where we come in. We guide homeowners through the entire process — from inspection, to paperwork, all the way through construction. And if the insurance company denies the claim, we step in and fight for them.”' },
          { label: 'Beat 4 — The meaning', text: '“To some it’s just a job. But the more you’re out there, on the front lines, you really see how much this helps people. They don’t have to come out of pocket — that’s money they can use for groceries, for savings, for things that actually matter.”' },
        ]
      },
      { type: 'divider_label', text: 'DOOR TO DOOR' },
      { type: 'say', text: '“At the start, your role is focused. You go door-to-door in areas where we know there’s been storm damage. You offer a free roof inspection — when someone’s interested, you schedule it with the team leader and they do the inspection and close the deal. Same day.”\n\n“You’re not doing this alone. You’re paired with a mentor in the field from day one. Leaders here don’t manage from a desk. They’re out there. That’s the culture.”' },
      { type: 'ask', text: '“How does that land for you, [candidate]? Some people hear this and feel the mission. Others hear about a sales job. Which one are you feeling right now?”' },
      {
        type: 'growth_investment',
        say: '“Here at Proliance, growth is not a slogan — it’s what we actually care about most. We recently had members pass their examination as Licensed Public Adjusters — some in under six months.”',
        ask: '“[candidate], if you become part of the team — what kind of growth do you want to see in yourself?”',
        note: '“I’ll take note of that — I want our team to know exactly how to support you.”',
        followup: '“And what if you’re already great at that — what would you do with that skill set? Do you want to be in leadership one day?”'
      },
      {
        type: 'social_proof_mini',
        note: 'Click a name. Use the one that matches this candidate’s background.',
        roster: [
          { name: 'Michelle', background: 'Bartender — Red Lobster', role: 'Licensed PA + Team Lead', story: 'Michelle came from bartending with zero sales experience. She went through the slow weeks, stayed anyway, and within her first month she was setting appointments consistently. She’s now a licensed public adjuster leading her own team.' },
          { name: 'Mimi', background: 'Food service industry', role: 'Apprentice — $800–$900/week', story: 'Mimi came from the food industry. She went through the hard weeks and stayed. She’s now earning $800 to $900 a week and outperforming most of the team.' },
          { name: 'Sean', background: 'Warehouse — no sales background', role: 'Team Lead — promoted in under a month', story: 'Sean came from the warehouse with zero sales experience. He just showed up every day and did the work. Within a month he was being trained for leadership.' },
        ]
      },
      { type: 'divider_label', text: 'SCHEDULE AND PAY' },
      { type: 'pay', text: '“Pay is straight commission. For every appointment you set that signs — you earn between $200 and $300.”\n\n“Our team on the lower end consistently earns $800 to $1,200 a week. Our top performers earn $2,000 to $3,000 a week. We pay weekly. No ceiling.”' },
      { type: 'say', text: '“This role starts at the apprentice level — everyone begins here to learn the ropes. If you grow quickly and prove you want to level up, we’ll invest in you — [training, licensing support, mentorship — fill in what applies].”' },
      { type: 'say', text: '“Typically within about six months, apprentices who are consistent and coachable move into a leadership role and begin pursuing their Public Adjuster license. We cover the upfront cost for apprentices to take the exam — materials, study sessions, everything that’ll help you pass.”' },
      { type: 'say', text: '“Once licensed, your pay moves from per-appointment to a percentage of each project. A typical roofing job is about $25,000 to $30,000, and leaders earn roughly 5 to 7% per closed project — that’s around $1,500 to $2,100 for a single closed deal. Now imagine closing three or more in a week.”' },
      { type: 'note', text: '“No pressure — but that’s what I want you to aim for if you want to truly change your situation.”' },
      { type: 'say', text: '“Moving up in this role isn’t just about bigger paychecks — it’s also about personal growth and building the habits to sustain that success. If you join us, we don’t want you thinking small anymore — the paycheck-to-paycheck mindset. Aim for the license. Aim to close your own deals.”' },
      { type: 'context', text: 'In this type of career, it’s easy to feel discouraged by rejection and missed quotas — this is a real test of how committed they are. Watch how they react to this framing.' },
      { type: 'ask', text: '“We’re based in Westmont — can you get there consistently? This is full-time, around 40 hours a week in the field. Does that work for you right now?”' },
      { type: 'divider_label', text: 'ROLE PLAY' },
      { type: 'say', text: '“Perfect. Let’s do a quick role play so you can feel what day one actually looks like.”\n\n“I’m going to be the homeowner. You knock on my door and offer the free inspection. Don’t overthink it — just talk to me the way you’d talk to anyone. Ready?”' },
      { type: 'context', text: 'Watch for: natural tone, comfort with rejection, ability to pivot when the homeowner pushes back. You’re not looking for perfect. You’re looking for coachable.' },
      { type: 'divider_label', text: 'HOMEWORK' },
      { type: 'note', text: 'Once the role play feels good — assign the bucket, then continue to the next step: Homework.' },
    ]
  },

  // ─── STEP 9: BUCKET ───
  {
    id: 'bucket',
    label: 'Assign bucket',
    section: 'Decision',
    cards: [
      { type: 'context', text: 'Assign the bucket internally. Do not narrate it to the candidate. Act immediately.' },
      {
        type: 'bucket_picker',
        buckets: [
          { num: 1, label: 'Move forward', sub: 'Chose sales intentionally. Names consequence of staying. Has chosen discomfort before.', action: 'Send homework now', cls: 'sel-b1' },
          { num: 2, label: 'Likes current job, not close to sales', sub: 'Enjoys their day-to-day but the only issue is a situational pain (manager, schedule, environment). No pull toward sales.', action: 'Exit — suggest lateral move', cls: 'sel-b2' },
          { num: 3, label: 'Too busy / overloaded', sub: 'Juggling too much. Treats this as a side project.', action: 'Exit Speech 1', cls: 'sel-b3' },
          { num: 4, label: 'Underestimates the role', sub: 'Overconfident without specifics. No D2D acknowledgment.', action: 'Exit Speech 1', cls: 'sel-b4' },
          { num: 5, label: 'Too agreeable', sub: 'Mirrors your language. "That makes sense" to everything.', action: 'Exit Speech 2', cls: 'sel-b5' },
          { num: 6, label: 'Exploring', sub: 'Sales is one of several options. No specific pull.', action: 'Exit Speech 3', cls: 'sel-b6' },
          { num: 7, label: 'Avoidance / fear', sub: 'Needs guarantees. Hesitates around rejection and risk.', action: 'Exit Speech 3', cls: 'sel-b7' },
          { num: 8, label: 'No direction', sub: '"I just want something different." No clear move toward anything.', action: 'Exit Speech 3', cls: 'sel-b8' },
          { num: 9, label: 'Income too unstable to switch', sub: 'Needs income now (employed-stable-income-needed with no flex, or unemployed and inconsistency is a real financial risk).', action: 'Timing exit', cls: 'sel-b7' },
        ]
      },
      {
        type: 'exit_speeches',
        speeches: [

// ─── STATE ───────────────────────────────────────────────────────
let state = {
  recruiter: null, candidate: '', currentStep: 0,
  answers: {}, flags: [], notes: {}, startTime: null, textOverrides: {},
};

function s(text) {
  if (!text) return text;
  return text.replace(/\[candidate\]/g, state.candidate||'[candidate]')
             .replace(/\[recruiter\]/g, state.recruiter||'[recruiter]')
             .replace(/\[position\]/g, (state.answers && state.answers.position) || '[position]');
}

function textHash(str) {
  let h = 0;
  str = str || '';
  for (let i=0;i<str.length;i++) { h = (h*31 + str.charCodeAt(i))|0; }
  return h.toString(36);
}

function getOverride(key, fallback) {
  if (state.textOverrides && Object.prototype.hasOwnProperty.call(state.textOverrides, key)) {
    return state.textOverrides[key];
  }
  return fallback;
}

function setOverride(key, value) {
  if (!state.textOverrides) state.textOverrides = {};
  state.textOverrides[key] = value;
  saveState();
}

function saveState() {
  if (!state.recruiter) return;
  localStorage.setItem('pla_state_'+state.recruiter, JSON.stringify(state));
}

function loadState(recruiter) {
  const raw = localStorage.getItem('pla_state_'+recruiter);
  if (raw) { try { Object.assign(state, JSON.parse(raw)); } catch(e) {} }
}

function getHistory(r) {
  try { return JSON.parse(localStorage.getItem('pla_history_'+r))||[]; } catch(e) { return []; }
}

function saveToHistory() {
  if (!state.recruiter) return;
  const hist = getHistory(state.recruiter);
  hist.unshift({ id:Date.now(), name:state.candidate||'Unnamed', date:new Date().toLocaleDateString(), time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), verdict:state.answers.verdict||null, bucket:state.answers.bucket||null, answers:{...state.answers}, flags:[...state.flags], notes:{...state.notes} });
  if (hist.length>40) hist.length=40;
  localStorage.setItem('pla_history_'+state.recruiter, JSON.stringify(hist));
}

// ─── LOGIN ───────────────────────────────────────────────────────
function initLogin() {
  const inp = document.getElementById('recruiter-input');
  document.getElementById('login-btn').onclick = () => {
    const name = inp.value.trim();
    if (!name) { inp.style.borderColor='var(--red)'; return; }
    inp.style.borderColor='';
    loginAs(name);
  };
  inp.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
  const recent = JSON.parse(localStorage.getItem('pla_recent_names')||'[]');
  if (recent.length) {
    const wrap = document.getElementById('recent-names');
    wrap.style.display = 'block';
    recent.slice(0,4).forEach(n => {
      const b = document.createElement('button'); b.className='recent-btn'; b.textContent=n;
      b.onclick = () => { inp.value=n; loginAs(n); };
      document.getElementById('recent-list').appendChild(b);
    });
  }
}

function loginAs(name) {
  state.recruiter = name;
  const recent = JSON.parse(localStorage.getItem('pla_recent_names')||'[]').filter(n=>n!==name);
  recent.unshift(name);
  localStorage.setItem('pla_recent_names', JSON.stringify(recent.slice(0,6)));
  loadState(name);
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  initApp();
}

function logout() {
  saveState();
  state = { recruiter:null, candidate:'', currentStep:0, answers:{}, flags:[], notes:{}, startTime:null };
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('recruiter-input').value='';
}

// ─── INIT APP ────────────────────────────────────────────────────
function initApp() {
  state.startTime = state.startTime||Date.now();
  document.getElementById('recruiter-name-display').textContent = state.recruiter;
  const candInp = document.getElementById('cand-name');
  candInp.value = state.candidate||'';
  candInp.addEventListener('input', () => {
    state.candidate = candInp.value.trim();
    saveState();
    renderStep(state.currentStep);
  });
  document.getElementById('new-btn').onclick = newInterview;
  document.querySelectorAll('.flag-btn').forEach(btn => btn.addEventListener('click', () => addFlag(btn.dataset.color)));
  if (STEPS[state.currentStep] && !stepVisible(STEPS[state.currentStep])) {
    const alt = nextVisibleIndex(state.currentStep-1);
    state.currentStep = alt>=0 ? alt : 0;
  }
  buildSidebar(); renderStep(state.currentStep); renderFlags(); updateProgress();
}

function newInterview() {
  if (!confirm('Start a new interview? Current session will be saved to history.')) return;
  saveToHistory();
  state.currentStep=0; state.answers={}; state.flags=[]; state.notes={}; state.candidate=''; state.startTime=Date.now();
  document.getElementById('cand-name').value='';
  document.getElementById('employ-pill').style.display='none';
  document.getElementById('lane-pill').style.display='none';
  saveState(); buildSidebar(); renderStep(0); updateProgress(); renderFlags();
}

// ─── STEP VISIBILITY (conditional steps, e.g. Commission Runway for unemployed only) ───
function stepVisible(step) {
  return !step.showIf || step.showIf();
}
function nextVisibleIndex(i) {
  for (let n=i+1; n<STEPS.length; n++) { if (stepVisible(STEPS[n])) return n; }
  return -1;
}
function prevVisibleIndex(i) {
  for (let n=i-1; n>=0; n--) { if (stepVisible(STEPS[n])) return n; }
  return -1;
}

// ─── SIDEBAR ─────────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById('sidebar'); sb.innerHTML='';
  let lastSection=null;
  STEPS.forEach((step,i) => {
    if (!stepVisible(step)) return;
    if (step.section!==lastSection) {
      if (lastSection) { const d=document.createElement('div'); d.className='sb-divider'; sb.appendChild(d); }
      const sec=document.createElement('div'); sec.className='sb-sec'; sec.textContent=step.section; sb.appendChild(sec);
      lastSection=step.section;
    }
    const item=document.createElement('div');
    item.className='sb-item'+(i===state.currentStep?' active':'')+(i<state.currentStep?' done':'');
    item.id='sb-'+i; item.dataset.step=i;
    const dot=document.createElement('span'); dot.className='sb-dot'; item.appendChild(dot);
    const lbl=document.createElement('span'); lbl.textContent=step.label; item.appendChild(lbl);
    if (step.gate) {
      const passed=state.answers['gate'+step.gateNum+'_passed'];
      const r=document.createElement('span'); r.className='sb-rating';
      r.textContent=passed==='yes'?'✓':passed==='no'?'✗':'';
      r.style.color=passed==='yes'?'var(--green)':'var(--red)'; item.appendChild(r);
    }
    item.onclick=()=>goStep(i); sb.appendChild(item);
  });
}

function updateSidebar() {
  document.querySelectorAll('.sb-item').forEach(el => {
    const i=parseInt(el.dataset.step);
    el.className='sb-item'+(i===state.currentStep?' active':'')+(i<state.currentStep?' done':'');
    const step=STEPS[i];
    if (step&&step.gate) {
      const passed=state.answers['gate'+step.gateNum+'_passed'];
      const r=el.querySelector('.sb-rating');
      if (r) { r.textContent=passed==='yes'?'✓':passed==='no'?'✗':''; r.style.color=passed==='yes'?'var(--green)':'var(--red)'; }
    }
  });
}

function goStep(i) {
  if (STEPS[i] && !stepVisible(STEPS[i])) {
    const alt = nextVisibleIndex(i-1);
    i = alt>=0 ? alt : i;
  }
  state.currentStep=i; saveState(); buildSidebar(); renderStep(i); updateProgress();
  document.getElementById('scroll-area').scrollTop=0;
}

function updateProgress() {
  document.getElementById('prog-fill').style.width=Math.round((state.currentStep/(STEPS.length-1))*100)+'%';
}

// ─── FLAGS ────────────────────────────────────────────────────────
function addFlag(color) {
  const text=prompt('Flag note:'); if(!text) return;
  state.flags.push({color,text,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
  saveState(); renderFlags();
}

function renderFlags() {
  const strip=document.getElementById('flags-strip'); strip.innerHTML='';
  if (!state.flags.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  state.flags.forEach((f,i) => {
    const chip=document.createElement('span'); chip.className='flag-chip';
    chip.style.cssText=`background:${f.color==='green'?'var(--green-bg)':f.color==='amber'?'var(--amber-bg)':'var(--red-bg)'};color:${f.color==='green'?'var(--green)':f.color==='amber'?'var(--amber)':'var(--red)'};cursor:pointer`;
    chip.textContent=f.time+' — '+f.text; chip.title='Click to remove';
    chip.onclick=()=>{state.flags.splice(i,1);saveState();renderFlags();};
    strip.appendChild(chip);
  });
}

// ─── RENDER STEP ─────────────────────────────────────────────────
function renderStep(idx) {
  const area=document.getElementById('scroll-area'); area.innerHTML='';
  const step=STEPS[idx]; if(!step) return;

  const eyebrow=document.createElement('div'); eyebrow.className='step-eye';
  eyebrow.textContent=step.section+' · Step '+(idx+1)+' of '+STEPS.length; area.appendChild(eyebrow);

  if (step.gate) {
    const gh=document.createElement('div'); gh.className='gate-header';
    gh.innerHTML=`<div class="gate-badge">GATE ${step.gateNum}</div><div class="gate-info"><div class="gate-name">${step.label.split('—')[1]?.trim()||step.label}</div><div class="gate-sub">${step.gateTitle}</div></div>`;
    area.appendChild(gh);
  } else {
    const title=document.createElement('div'); title.className='step-title'; title.textContent=step.label; area.appendChild(title);
  }

  step.cards.forEach((card,ci)=>area.appendChild(renderCard(card, step.id+'_'+ci)));

  // Notes toggle
  const key='notes_'+step.id;
  const hasNote=!!state.notes[key];
  const nt=document.createElement('div'); nt.className='notes-toggle';
  const ntBtn=document.createElement('button'); ntBtn.className='notes-toggle-btn';
  ntBtn.textContent=hasNote?'📝 Notes (saved)':'+ Add notes';
  const nw=document.createElement('div'); nw.className='notes-wrap'; nw.id='notes-'+step.id; nw.style.display=hasNote?'block':'none';
  const ta=document.createElement('textarea'); ta.placeholder='Notes for this step...'; ta.value=state.notes[key]||'';
  ta.addEventListener('input',()=>{state.notes[key]=ta.value;saveState();ntBtn.textContent='📝 Notes (saved)';});
  nw.appendChild(ta); nt.appendChild(ntBtn); area.appendChild(nt); area.appendChild(nw);
  ntBtn.onclick=()=>{const o=nw.style.display!=='none';nw.style.display=o?'none':'block';ntBtn.textContent=o?(hasNote||state.notes[key]?'📝 Notes (saved)':'+ Add notes'):'− Hide notes';};

  const nav=document.createElement('div'); nav.className='nav-row';
  const prevIdx=prevVisibleIndex(idx), nextIdx=nextVisibleIndex(idx);
  if (prevIdx>=0) { const b=document.createElement('button'); b.className='btn-sec'; b.textContent='← Back'; b.onclick=()=>goStep(prevIdx); nav.appendChild(b); }
  if (nextIdx>=0) { const b=document.createElement('button'); b.className='btn-primary'; b.textContent=nextIdx===STEPS.length-1?'Debrief →':'Next →'; b.onclick=()=>goStep(nextIdx); nav.appendChild(b); }
  area.appendChild(nav);
}

// ─── CARD RENDERERS ──────────────────────────────────────────────
function renderCard(card, ctx) {
  switch(card.type) {
    case 'context': return mkContext(card.text);
    case 'say': return mkTag('say','SAY',card.text, ctx);
    case 'ask': return mkTag('ask','ASK',card.text, ctx);
    case 'note': return mkTag('note','NOTE',card.text, ctx);
    case 'rule': return mkTag('rule','RULE',card.text, ctx);
    case 'pay': return mkTag('say','PAY STRUCTURE',card.text, ctx);
    case 'listen': return mkListen(card);
    case 'exit_block': return mkExitBlock(card, ctx);
    case 'lane_choice': return mkLaneChoice(card);
    case 'lane_content': return mkLaneContent(card, ctx);
    case 'commission_choice': return mkCommissionChoice(card, ctx);
    case 'gate_pass': return mkGatePass(card);
    case 'bucket_picker': return mkBucketPicker(card);
    case 'exit_speeches': return mkExitSpeeches(card, ctx);
    case 'beats': return mkBeats(card, ctx);
    case 'growth_investment': return mkGrowthInvestment(card, ctx);
    case 'hw_paths': return mkHWPaths(card, ctx);
    case 'debrief_questions': return mkDebrief(card);
    case 'verdict': return mkVerdict(card);
    case 'notes_area': return mkNotesArea(card);
    case 'save_export': return mkSaveExport();
    case 'rating': return mkRating(card);
    case 'learn_branch': return mkLearnBranch();
    case 'rule_toggle': return mkRuleToggle(card, ctx);
    case 'divider_label': return mkDividerLabel(card.text);
    case 'lane_menu_toggle': return mkLaneMenuToggle();
    case 'gate1_picker': return mkGate1Picker(card, ctx);
    case 'commission_interrupt': return mkCommissionInterrupt(card);
    case 'hw_template_area': return mkHWTemplateArea();
    case 'social_proof_mini': return mkSocialProof(card, ctx);
    case 'setup_fields': return mkSetupFields();
    case 'intro_branch': return mkIntroBranch();
    case 'phrase_bank': return mkPhraseBank(card, ctx);
    case 'dialogue_example': return mkDialogueExample(card, ctx);
    default: return document.createElement('div');
  }
}

function mkContext(text) {
  const p=document.createElement('p'); p.className='context-text'; p.textContent=text; return p;
}

function mkTag(type,label,rawText,ctx) {
  const c=document.createElement('div'); c.className='card';
  const t=document.createElement('span'); t.className='tag t-'+type; t.textContent=label; c.appendChild(t);
  const hint=document.createElement('span'); hint.className='edit-hint'; hint.textContent='✎ editable'; c.appendChild(hint);
  const key=(ctx||'x')+':'+type+':'+textHash(rawText);
  const stored=getOverride(key, rawText);
  const p=document.createElement('div'); p.className='q-text editable'; p.contentEditable=true; p.style.whiteSpace='pre-wrap';
  p.textContent=s(stored);
  p.addEventListener('input',()=>{ setOverride(key, p.textContent); });
  c.appendChild(p);
  return c;
}

function mkListen(card) {
  const w=document.createElement('div'); w.className='card';
  const t=document.createElement('span'); t.className='tag t-listen'; t.textContent='LISTEN FOR'; w.appendChild(t);
  card.items.forEach(item=>{
    const isPass=item.startsWith('PASS'), isFail=item.startsWith('FAIL');
    const row=document.createElement('div'); row.className='listen-toggle-row';
    const color=isPass?'var(--green)':isFail?'var(--red)':'var(--text2)';
    const bg=isPass?'var(--green-bg)':isFail?'var(--red-bg)':'var(--bg2)';
    const labelText=isPass?'PASS':isFail?'FAIL':'→';
    const bodyText=isPass?item.slice(5):isFail?item.slice(5):item;
    const dashIdx=bodyText.indexOf(' — ');
    const hasDetail=dashIdx>-1;
    const shortText=hasDetail?bodyText.slice(0,dashIdx):bodyText;
    const detailText=hasDetail?bodyText.slice(dashIdx+3):null;
    row.style.cssText=`border-bottom:1px solid var(--border);padding:5px 0`;
    if (!hasDetail) {
      row.innerHTML=`<span style="font-size:11px;font-weight:800;color:${color};margin-right:6px">${labelText}</span><span style="font-size:13px;color:var(--text)">${shortText}</span>`;
    } else {
      const btn=document.createElement('div');
      btn.style.cssText=`display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0`;
      btn.innerHTML=`<span style="font-size:11px;font-weight:800;color:${color}">${labelText}</span><span style="font-size:13px;color:var(--text);flex:1">${shortText}</span><span class="listen-chevron" style="font-size:12px;color:var(--text3)">▸</span>`;
      const detail=document.createElement('div');
      detail.style.cssText=`display:none;font-size:12.5px;color:var(--text2);padding:5px 8px;margin-top:3px;background:${bg};border-radius:4px;line-height:1.55`;
      detail.textContent=detailText;
      btn.onclick=()=>{const o=detail.style.display!=='none';detail.style.display=o?'none':'block';btn.querySelector('.listen-chevron').textContent=o?'▸':'▾';};
      row.appendChild(btn); row.appendChild(detail);
    }
    w.appendChild(row);
  });
  return w;
}

function mkExitBlock(card, ctx) {
  const w=document.createElement('div');
  const eb=document.createElement('div'); eb.className='exit-block';
  const lbl=document.createElement('div'); lbl.className='exit-lbl'; lbl.textContent=card.label||'EXIT — say verbatim'; eb.appendChild(lbl);
  const key=(ctx||'x')+':exit:'+textHash(card.text);
  const stored=getOverride(key, card.text);
  const say=document.createElement('div'); say.className='exit-say editable'; say.contentEditable=true; say.style.whiteSpace='pre-wrap';
  say.textContent=s(stored);
  say.addEventListener('input',()=>{ setOverride(key, say.textContent); });
  eb.appendChild(say);
  w.appendChild(eb); return w;
}

let currentLanes={};
let currentLaneCtx='';
function mkLaneChoice(card) {
  const w=document.createElement('div'); w.className='choice-card';
  const q=document.createElement('div'); q.className='choice-q'; q.textContent=card.question; w.appendChild(q);
  const opts=document.createElement('div'); opts.className='opts';
  card.opts.forEach(o=>{
    const btn=document.createElement('button'); btn.className='opt-btn'; btn.textContent=o.label;
    if(state.answers.lane===o.val) btn.classList.add('sel-b');
    btn.onclick=()=>{
      opts.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('sel-b','sel-g','sel-r','sel-a'));
      btn.classList.add('sel-b'); state.answers.lane=o.val;
      const pill=document.getElementById('lane-pill');
      pill.style.display='inline-block'; pill.style.background='var(--blue-bg)'; pill.style.color='var(--blue)';
      pill.textContent=o.label; saveState();
      const lc=document.querySelector('.lane-content-area');
      if(lc){const nl=mkLaneContent({type:'lane_content',lanes:currentLanes}, currentLaneCtx); nl.className='lane-content-area'; lc.replaceWith(nl);}
    };
    opts.appendChild(btn);
  });
  w.appendChild(opts); return w;
}

function mkLaneContent(card, ctx) {
  currentLanes=card.lanes;
  currentLaneCtx=ctx||currentLaneCtx;
  const w=document.createElement('div'); w.className='lane-content-area';
  const lane=state.answers.lane;
  if(!lane){const n=document.createElement('p');n.className='context-text';n.textContent='Select a lane above to see the questions.';w.appendChild(n);return w;}
  (card.lanes[lane]||[]).forEach((c,i)=>w.appendChild(renderCard(c, currentLaneCtx+'_lane'+lane+'_'+i)));
  return w;
}

// commission_choice card: comfortable / stable buttons with branching content underneath
function mkCommissionChoice(card, ctx) {
